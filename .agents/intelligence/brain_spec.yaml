# =============================================================================
# BRAIN SPEC v2.0 — Universal Knowledge Graph + Impact Analysis Engine
# =============================================================================
# This is the SINGLE SOURCE OF TRUTH for the brain's structure, behavior, and
# evolution. Every session that touches the brain reads this spec first.
# Every node/edge must conform. The spec grows (append-only), never shrinks.
#
# First instance: SAP UNESCO (abapobjectscreation)
# Template for: ecosystem-coordinator/enterprise-brain skill
#
# Created: Session #039 (2026-04-06)
# Architecture doc: BRAIN_V2_ARCHITECTURE.md
# Market validation: Graphiti, Celonis PI Graph, Agentic GraphRAG, Neo4j MCP
# =============================================================================

spec_version: "2.0"
created: "2026-04-06"
instance: "sap_unesco"

# =============================================================================
# DESIGN PRINCIPLES (non-negotiable)
# =============================================================================
principles:
  - id: P1
    name: "Living Organism"
    rule: "Brain grows every session. No edge is deleted — superseded edges get valid_until."
  - id: P2
    name: "Companions Are Checkpoints"
    rule: "Each companion is a versioned snapshot. Diff between versions = knowledge evolution."
  - id: P3
    name: "Continuous Enrichment"
    rule: "Session close triggers brain ingestion. Retro findings become edges automatically."
  - id: P4
    name: "Confidence Decay"
    rule: "Edges lose 0.05 confidence per 10 sessions without revalidation. Floor = 0.3."
  - id: P5
    name: "Append-Only Schema"
    rule: "New node/edge types added to spec without migration. No rewrites."
  - id: P6
    name: "Object-Centric Process Mining"
    rule: "Process events link to graph objects (OCEL 2.0), not just sequences."
  - id: P7
    name: "Self-Improving Reasoning"
    rule: "3 loops: critique (per-query), co-evolution (per-session), refinement (per-feedback)."
  - id: P8
    name: "Platform Absorption"
    rule: "MCP server + Agent Skills + Agent Teams = model upgrades improve brain for free."
  - id: P9
    name: "Ecosystem Replicability"
    rule: "Spec is domain-agnostic. Instance defines parsers and sources."

# =============================================================================
# NODE TYPES (30 types, 6 categories)
# =============================================================================
node_types:
  # --- Category 1: Code Objects ---
  ABAP_CLASS:
    description: "OO class (ZCL_*, YCL_*, CL_*)"
