<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Knowledge Base</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
    <style>
        :root {
            --base-background-color: #1e1e2e;
            --heading-color: #cdd6f4;
            --text-color: #bac2de;
            --code-inline-color: #f38ba8;
            --link-color: #89b4fa;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            name: 'UNESCO SAP Knowledge Base',
            loadSidebar: false,
            subMaxLevel: 3,
            search: 'auto',
            auto2top: true,
            homepage: 'knowledge_base_index.md'
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-abap.min.js"></script>
</body>

</html>
